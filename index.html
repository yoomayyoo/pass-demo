<!DOCTYPE html>
<html>
<head>
  <title>PaaS Demo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffe4ec; /* pink soft */
      font-family: Arial, sans-serif;
    }

    .card {
      background: white;
      padding: 30px 50px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      color: #ff4d88;
      margin-bottom: 10px;
    }

    p {
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello PaaS 🚀</h1>
    <p>Deploy otomatis dengan GitHub & Vercel</p>
  </div>
</body>
</html>
